<!DOCTYPE html>
<html>
<head>
<title>Treble Dusk</title>

<style>

body{
margin:0;
overflow:hidden;
background:#0b4da2;
font-family:Arial;
}

/* Scene */

#scene{
width:200vw;
height:100vh;
display:flex;
align-items:center;
}

/* Character */

#character{
width:60px;
height:60px;
background:white;
border-radius:10px;
position:absolute;
bottom:80px;
left:50px;
transition:left 5s linear;
}

/* Auditorium */

#auditorium{
position:absolute;
right:200px;
bottom:50px;
width:200px;
height:120px;
background:orange;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
}

/* Button */

#forwardBtn{
position:absolute;
bottom:20px;
left:20px;
padding:15px 25px;
background:orange;
color:white;
border:none;
font-size:18px;
cursor:pointer;
border-radius:8px;
}

/* Title */

#title{
position:absolute;
top:40%;
left:50%;
transform:translateX(-50%);
text-align:center;
color:white;
display:none;
}

#title h1{
font-size:80px;
margin:0;
color:orange;
}

#title h2{
font-size:35px;
margin-top:10px;
}

canvas{
position:absolute;
top:0;
left:0;
}

</style>
</head>


<body>

<div id="scene">

<div id="character"></div>

<div id="auditorium">
Multipurpose Hall
</div>

</div>

<button id="forwardBtn">Move Forward →</button>


<div id="title">

<h1>Treble Dusk 7.0</h1>

<h2>Register Now!</h2>

</div>


<audio id="song">
<source src="song.mp3" type="audio/mpeg">
</audio>


<canvas id="fireworks"></canvas>


<script>

let btn = document.getElementById("forwardBtn")
let character = document.getElementById("character")
let title = document.getElementById("title")
let song = document.getElementById("song")

btn.onclick = function(){

character.style.left = "600px"

btn.style.display="none"

setTimeout(()=>{
showCelebration()
},5000)

}


function showCelebration(){

title.style.display="block"

song.play()

startFireworks()

}


/* Fireworks */

const canvas = document.getElementById("fireworks")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let particles=[]

function startFireworks(){

setInterval(()=>{
for(let i=0;i<50;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height/2,
dx:(Math.random()-0.5)*4,
dy:(Math.random()-0.5)*4,
life:100
})

}
},500)

}


function animate(){

ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

particles.forEach((p,i)=>{

p.x+=p.dx
p.y+=p.dy
p.life--

ctx.fillStyle="orange"
ctx.beginPath()
ctx.arc(p.x,p.y,3,0,Math.PI*2)
ctx.fill()

if(p.life<=0){
particles.splice(i,1)
}

})

requestAnimationFrame(animate)

}

animate()

</script>


</body>
</html>
