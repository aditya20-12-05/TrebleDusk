<!DOCTYPE html>
<html>
<head>
<title>Treble Dusk 7.0</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#moveBtn{
position:absolute;
bottom:30px;
left:30px;
padding:15px 30px;
font-size:18px;
background:#ff7a00;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
z-index:10;
display:none;
}

#title{
position:absolute;
top:40%;
width:100%;
text-align:center;
color:white;
display:none;
z-index:10;
}

#title h1{
font-size:90px;
color:#ff7a00;
text-shadow:0 0 50px orange;
}

#title h2{
font-size:36px;
}
</style>
</head>

<body>

<button id="moveBtn">Move Forward →</button>

<div id="title">
<h1>Treble Dusk 7.0</h1>
<h2>Register Now!</h2>
</div>

<audio id="song">
<source src="song.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

/* SCENE */

const scene=new THREE.Scene()
scene.background=new THREE.Color(0x020312)
scene.fog=new THREE.Fog(0x020312,40,200)

/* CAMERA */

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(0,4,12)

/* RENDERER */

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5))
document.body.appendChild(renderer.domElement)

/* LIGHTING */

scene.add(new THREE.AmbientLight(0xffffff,0.35))

const moonLight=new THREE.DirectionalLight(0x99aaff,0.9)
moonLight.position.set(20,40,10)
scene.add(moonLight)

/* PLANETS */

function createPlanet(size,color,x,y,z){

const planet=new THREE.Mesh(
new THREE.SphereGeometry(size,32,32),
new THREE.MeshStandardMaterial({
color:color,
emissive:color,
emissiveIntensity:0.2
})
)

planet.position.set(x,y,z)
scene.add(planet)

}

createPlanet(40,0xff8844,-600,200,-900)
createPlanet(30,0x44aaff,700,300,-1000)
createPlanet(35,0xaa66ff,500,120,-800)

/* GROUND */

const ground=new THREE.Mesh(
new THREE.PlaneGeometry(600,600),
new THREE.MeshStandardMaterial({color:0x12122a})
)

ground.rotation.x=-Math.PI/2
scene.add(ground)

/* PATH */

const path=new THREE.Mesh(
new THREE.PlaneGeometry(6,200),
new THREE.MeshStandardMaterial({color:0x2c2c40})
)

path.rotation.x=-Math.PI/2
path.position.y=0.01
scene.add(path)

/* WALKWAY LAMPS */

function createLamp(x,z){

const pole=new THREE.Mesh(
new THREE.CylinderGeometry(0.08,0.08,3,16),
new THREE.MeshStandardMaterial({color:0x555555})
)

pole.position.set(x,1.5,z)
scene.add(pole)

const bulb=new THREE.Mesh(
new THREE.SphereGeometry(0.2),
new THREE.MeshStandardMaterial({
color:0xffcc66,
emissive:0xffaa33,
emissiveIntensity:2
})
)

bulb.position.set(x,3,z)
scene.add(bulb)

const light=new THREE.PointLight(0xffaa33,1.2,10)
light.position.set(x,3,z)

scene.add(light)

}

for(let i=0;i<12;i++){

createLamp(-2.5,-20-i*8)
createLamp(2.5,-20-i*8)

}

/* STARS */

const starGeo=new THREE.BufferGeometry()
let starVerts=[]

for(let i=0;i<5000;i++){

starVerts.push(
(Math.random()-0.5)*1500,
Math.random()*800,
(Math.random()-0.5)*1500
)

}

starGeo.setAttribute(
"position",
new THREE.Float32BufferAttribute(starVerts,3)
)

const stars=new THREE.Points(
starGeo,
new THREE.PointsMaterial({color:0xffffff,size:2})
)

scene.add(stars)

/* MOON */

const moon=new THREE.Mesh(
new THREE.SphereGeometry(30,32,32),
new THREE.MeshStandardMaterial({color:0xffffdd})
)

moon.position.set(-250,300,-500)
scene.add(moon)

/* CHARACTER */

const character=new THREE.Group()

const charMat=new THREE.MeshStandardMaterial({color:0xffff00})

function limb(w,h,x,y){
const m=new THREE.Mesh(
new THREE.BoxGeometry(w,h,w),
charMat
)
m.position.set(x,y,0)
return m
}

const body=limb(.8,1.5,0,1.2)
const head=new THREE.Mesh(new THREE.SphereGeometry(.4),charMat)
head.position.y=2.2

const leftArm=limb(.25,1,-.65,1.2)
const rightArm=limb(.25,1,.65,1.2)
const leftLeg=limb(.3,1,-.25,.4)
const rightLeg=limb(.3,1,.25,.4)

character.add(body,head,leftArm,rightArm,leftLeg,rightLeg)
scene.add(character)

/* HALL */

const hall=new THREE.Mesh(
new THREE.BoxGeometry(18,12,18),
new THREE.MeshStandardMaterial({
color:0xff7a00,
metalness:.5,
roughness:.3
})
)

hall.position.set(0,6,-55)
scene.add(hall)

/* PILLARS */

function pillar(x){

const p=new THREE.Mesh(
new THREE.CylinderGeometry(.8,.8,10,32),
new THREE.MeshStandardMaterial({color:0x111111})
)

p.position.set(x,5,-52)
scene.add(p)

}

pillar(-7)
pillar(7)

/* STAGE */

const stage=new THREE.Mesh(
new THREE.BoxGeometry(16,1,10),
new THREE.MeshStandardMaterial({
color:0xd4af37,
metalness:.8,
roughness:.3
})
)

stage.position.set(0,.5,-42)
scene.add(stage)

/* DRUM KIT */

const drum=new THREE.Mesh(
new THREE.CylinderGeometry(1.5,1.5,1,32),
new THREE.MeshStandardMaterial({color:0xffffff})
)

drum.position.set(0,1.2,-44)
scene.add(drum)

function cymbal(x){

const stand=new THREE.Mesh(
new THREE.CylinderGeometry(.05,.05,2.5),
new THREE.MeshStandardMaterial({color:0xaaaaaa})
)

stand.position.set(x,2.5,-44)
scene.add(stand)

const plate=new THREE.Mesh(
new THREE.CylinderGeometry(1,1,.1,32),
new THREE.MeshStandardMaterial({color:0xffd700})
)

plate.position.set(x,3.6,-44)
scene.add(plate)

}

cymbal(-2)
cymbal(2)

/* GUITARISTS */

function guitarist(x,color){

const g=new THREE.Group()

const body=new THREE.Mesh(
new THREE.BoxGeometry(1,1.8,.6),
new THREE.MeshStandardMaterial({color})
)

body.position.y=1

const head=new THREE.Mesh(
new THREE.SphereGeometry(.45),
new THREE.MeshStandardMaterial({color})
)

head.position.y=2.4

g.add(body,head)

g.position.set(x,0,-41)

scene.add(g)

}

guitarist(-5,0xff4444)
guitarist(5,0x44ff88)

/* SINGER */

const singer=new THREE.Mesh(
new THREE.CylinderGeometry(.7,.8,2),
new THREE.MeshStandardMaterial({color:0xffffff})
)

singer.position.set(0,1,-39)
scene.add(singer)

/* MICROPHONE */

const mic=new THREE.Mesh(
new THREE.CylinderGeometry(.05,.05,2.5),
new THREE.MeshStandardMaterial({color:0xaaaaaa})
)

mic.position.set(0,1.3,-39)
scene.add(mic)

/* SPEAKERS */

function speaker(x){

const s=new THREE.Mesh(
new THREE.BoxGeometry(3,8,3),
new THREE.MeshStandardMaterial({
color:0xaa00ff,
emissive:0xaa00ff,
emissiveIntensity:2
})
)

s.position.set(x,4,-40)
scene.add(s)

}

speaker(-12)
speaker(12)

/* CROWD */

const crowd=[]

function createPerson(x,z){

const person=new THREE.Group()

/* body */

const body=new THREE.Mesh(
new THREE.CylinderGeometry(0.3,0.4,1.2,8),
new THREE.MeshStandardMaterial({color:0x111111})
)

body.position.y=0.6

/* head */

const head=new THREE.Mesh(
new THREE.SphereGeometry(0.25,8,8),
new THREE.MeshStandardMaterial({color:0x111111})
)

head.position.y=1.5

person.add(body)
person.add(head)

person.position.set(x,0,z)

scene.add(person)

crowd.push(person)

}

/* generate crowd */

for(let i=0;i<250;i++){

const x=(Math.random()-0.5)*30
const z=-25-Math.random()*10

createPerson(x,z)

}

/* STAGE LIGHTS */

function createLight(x){

const light=new THREE.SpotLight(0xff7a00,8)
light.position.set(x,12,-40)
light.angle=Math.PI/6
light.penumbra=.5
light.distance=120

const target=new THREE.Object3D()
target.position.set(0,0,-42)
scene.add(target)

light.target=target

scene.add(light)

}

createLight(-8)
createLight(-4)
createLight(0)
createLight(4)
createLight(8)

/* FIREWORKS */

let fireworks=[]

function createFirework(){

for(let i=0;i<80;i++){

const p=new THREE.Mesh(
new THREE.SphereGeometry(.25),
new THREE.MeshBasicMaterial({
color:[0xff7a00,0xffffff,0x4488ff][Math.floor(Math.random()*3)]
})
)

p.position.set(Math.random()*40-20,20,-70)

p.v={
x:(Math.random()-.5)*1.8,
y:Math.random()*3,
z:(Math.random()-.5)*1.8
}

scene.add(p)
fireworks.push(p)

}

}

/* MOVEMENT */

let intro=true
let moving=false
let dancing=false
let introTime=0
const stopZ=-32

document.getElementById("moveBtn").onclick=function(){
moving=true
this.style.display="none"
}

/* ANIMATION */

function animate(){

requestAnimationFrame(animate)

stars.rotation.y+=0.0002

if(intro){
camera.position.z -= 0.02
introTime++

if(introTime > 300){
intro=false
document.getElementById("moveBtn").style.display="block"
}
}

if(moving){

if(character.position.z>stopZ){

character.position.z-=.09
camera.position.z-=.09

const walk=Math.sin(Date.now()*0.01)

leftLeg.rotation.x=walk
rightLeg.rotation.x=-walk
leftArm.rotation.x=-walk
rightArm.rotation.x=walk

}else{

moving=false
dancing=true

document.getElementById("title").style.display="block"
document.getElementById("song").play()

setInterval(createFirework,700)

}

}

if(dancing){

character.rotation.y+=0.05
character.position.y=Math.sin(Date.now()*0.01)*.3

crowd.forEach((p,i)=>{
p.position.y=Math.sin(Date.now()*0.004+i)*0.15
})

}

fireworks.forEach((p,i)=>{

p.position.x+=p.v.x
p.position.y+=p.v.y
p.position.z+=p.v.z
p.v.y-=.05

if(p.position.y < -5){
scene.remove(p)
fireworks.splice(i,1)
}

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
