<!DOCTYPE html>
<html>
<head>

<title>Treble Dusk 7.0</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#moveBtn{
position:absolute;
bottom:30px;
left:30px;
padding:15px 30px;
font-size:18px;
background:#ff7a00;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
z-index:10;
}

#title{
position:absolute;
top:40%;
width:100%;
text-align:center;
color:white;
display:none;
z-index:10;
}

#title h1{
font-size:90px;
color:#ff7a00;
text-shadow:0 0 40px orange;
}

#title h2{
font-size:35px;
}

</style>
</head>

<body>

<button id="moveBtn">Move Forward →</button>

<div id="title">
<h1>Treble Dusk 7.0</h1>
<h2>Register Now!</h2>
</div>

<audio id="song">
<source src="song.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

/* SCENE */

const scene = new THREE.Scene()
scene.background = new THREE.Color(0x01030a)

/* CAMERA */

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(0,4,12)

/* RENDERER */

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

/* LIGHT */

const ambient = new THREE.AmbientLight(0xffffff,0.3)
scene.add(ambient)

const moon = new THREE.DirectionalLight(0x99aaff,0.7)
moon.position.set(20,30,10)
scene.add(moon)

/* GROUND */

const ground = new THREE.Mesh(
new THREE.PlaneGeometry(400,400),
new THREE.MeshStandardMaterial({color:0xffffff})
)

ground.rotation.x = -Math.PI/2
scene.add(ground)

/* PATH */

const path = new THREE.Mesh(
new THREE.PlaneGeometry(6,200),
new THREE.MeshStandardMaterial({color:0x666666})
)

path.rotation.x=-Math.PI/2
path.position.y=0.01
scene.add(path)

/* STARS */

const starGeo = new THREE.BufferGeometry()
const starCount = 3000
let starVerts = []

for(let i=0;i<starCount;i++){

starVerts.push(
(Math.random()-0.5)*1000,
Math.random()*500,
(Math.random()-0.5)*1000
)

}

starGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(starVerts,3)
)

const stars = new THREE.Points(
starGeo,
new THREE.PointsMaterial({color:0xffffff,size:1.5})
)

scene.add(stars)

/* PLANETS */

function createPlanet(size,color,x,y,z){

const planet = new THREE.Mesh(
new THREE.SphereGeometry(size,32,32),
new THREE.MeshStandardMaterial({color:color})
)

planet.position.set(x,y,z)
scene.add(planet)

}

createPlanet(6,0xff8844,-120,120,-200)
createPlanet(4,0x44aaff,150,150,-300)
createPlanet(5,0xaa66ff,200,80,-250)

/* CHARACTER (stylized humanoid) */

const body = new THREE.Mesh(
new THREE.CylinderGeometry(0.4,0.5,2),
new THREE.MeshStandardMaterial({color:0xffffff})
)

body.position.y=1

const head = new THREE.Mesh(
new THREE.SphereGeometry(0.45),
new THREE.MeshStandardMaterial({color:0xffffff})
)

head.position.y=2.3

const character = new THREE.Group()
character.add(body)
character.add(head)

scene.add(character)

/* MULTIPURPOSE HALL */

const hall = new THREE.Mesh(
new THREE.BoxGeometry(14,8,14),
new THREE.MeshStandardMaterial({
color:0xff7a00,
emissive:0x441100,
emissiveIntensity:1
})
)

hall.position.set(0,4,-50)
scene.add(hall)

/* SPEAKERS */

function speaker(x){

const s = new THREE.Mesh(
new THREE.BoxGeometry(2,4,2),
new THREE.MeshStandardMaterial({color:0x111111})
)

s.position.set(x,2,-45)
scene.add(s)

}

speaker(-8)
speaker(8)

/* LIGHTS */

for(let i=0;i<10;i++){

const light = new THREE.PointLight(0xff7a00,2,50)

light.position.set((i-5)*2,3,-40)

scene.add(light)

}

/* FIREWORKS */

let fireworks=[]

function createFirework(){

const colors=[0xff7a00,0xffffff,0x4488ff]

for(let i=0;i<150;i++){

const p = new THREE.Mesh(
new THREE.SphereGeometry(0.12),
new THREE.MeshBasicMaterial({
color:colors[Math.floor(Math.random()*colors.length)]
})
)

p.position.set(Math.random()*20-10,15,-50)

p.v={
x:(Math.random()-0.5)*0.6,
y:Math.random()*1.2,
z:(Math.random()-0.5)*0.6
}

scene.add(p)
fireworks.push(p)

}

}

/* SHOOTING STARS */

let shooting=[]

function createShootingStar(){

const star = new THREE.Mesh(
new THREE.SphereGeometry(0.2),
new THREE.MeshBasicMaterial({color:0xffffff})
)

star.position.set(
(Math.random()-0.5)*200,
200,
-200
)

star.v={x:-2,y:-1,z:0}

scene.add(star)
shooting.push(star)

}

setInterval(createShootingStar,4000)

/* MOVEMENT */

let moving=false

document.getElementById("moveBtn").onclick=function(){

moving=true
this.style.display="none"

setTimeout(()=>{
celebrate()
},5000)

}

function celebrate(){

document.getElementById("title").style.display="block"

document.getElementById("song").play()

setInterval(createFirework,800)

}

/* ANIMATION */

function animate(){

requestAnimationFrame(animate)

/* WALKING */

if(moving){

character.position.z -=0.09
camera.position.z -=0.09

character.position.y = 0 + Math.sin(Date.now()*0.01)*0.1

}

/* FIREWORK PHYSICS */

fireworks.forEach(p=>{

p.position.x += p.v.x
p.position.y += p.v.y
p.position.z += p.v.z

p.v.y -=0.03

})

/* SHOOTING STARS */

shooting.forEach(s=>{

s.position.x+=s.v.x
s.position.y+=s.v.y

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
