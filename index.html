<!DOCTYPE html>
<html>
<head>
<title>Treble Dusk 7.0</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#moveBtn{
position:absolute;
bottom:30px;
left:30px;
padding:15px 30px;
font-size:18px;
background:#ff7a00;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
z-index:10;
}

#title{
position:absolute;
top:40%;
width:100%;
text-align:center;
color:white;
display:none;
z-index:10;
}

#title h1{
font-size:90px;
color:#ff7a00;
text-shadow:0 0 50px orange;
}

#title h2{
font-size:36px;
}
</style>
</head>

<body>

<button id="moveBtn">Move Forward →</button>

<div id="title">
<h1>Treble Dusk 7.0</h1>
<h2>Register Now!</h2>
</div>

<audio id="song">
<source src="song.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

/* SCENE */

const scene = new THREE.Scene()
scene.background = new THREE.Color(0x020312)
scene.fog = new THREE.Fog(0x020312,40,200)

/* CAMERA */

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(0,4,12)

/* RENDERER */

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

/* LIGHTING */

scene.add(new THREE.AmbientLight(0xffffff,0.35))

const moonLight = new THREE.DirectionalLight(0x99aaff,0.9)
moonLight.position.set(20,40,10)
scene.add(moonLight)

/* GROUND */

const ground = new THREE.Mesh(
new THREE.PlaneGeometry(600,600),
new THREE.MeshStandardMaterial({color:0x12122a})
)

ground.rotation.x = -Math.PI/2
scene.add(ground)

/* PATH */

const path = new THREE.Mesh(
new THREE.PlaneGeometry(6,200),
new THREE.MeshStandardMaterial({color:0x2c2c40})
)

path.rotation.x = -Math.PI/2
path.position.y = 0.01
scene.add(path)

/* PATH LIGHTS */

for(let i=0;i<14;i++){

const light = new THREE.PointLight(0xff7a00,2,25)

light.position.set(
(i-7)*2,
0.5,
-20-i*6
)

scene.add(light)

}

/* STARS */

const starGeo = new THREE.BufferGeometry()
let starVerts=[]

for(let i=0;i<5000;i++){

starVerts.push(
(Math.random()-0.5)*1500,
Math.random()*800,
(Math.random()-0.5)*1500
)

}

starGeo.setAttribute(
"position",
new THREE.Float32BufferAttribute(starVerts,3)
)

const stars = new THREE.Points(
starGeo,
new THREE.PointsMaterial({color:0xffffff,size:2})
)

scene.add(stars)

/* MOON */

const moon = new THREE.Mesh(
new THREE.SphereGeometry(30,32,32),
new THREE.MeshStandardMaterial({color:0xffffdd})
)

moon.position.set(-250,300,-500)
scene.add(moon)

/* CHARACTER */

const character = new THREE.Group()

const charMat = new THREE.MeshStandardMaterial({color:0xffff00})

function limb(w,h,x,y){
const m = new THREE.Mesh(
new THREE.BoxGeometry(w,h,w),
charMat
)
m.position.set(x,y,0)
return m
}

const body = limb(.8,1.5,0,1.2)
const head = new THREE.Mesh(new THREE.SphereGeometry(.4),charMat)
head.position.y = 2.2

const leftArm = limb(.25,1,-.65,1.2)
const rightArm = limb(.25,1,.65,1.2)
const leftLeg = limb(.3,1,-.25,.4)
const rightLeg = limb(.3,1,.25,.4)

character.add(body,head,leftArm,rightArm,leftLeg,rightLeg)

scene.add(character)

/* HALL */

const hall = new THREE.Mesh(
new THREE.BoxGeometry(18,12,18),
new THREE.MeshStandardMaterial({
color:0xff7a00,
metalness:.5,
roughness:.3
})
)

hall.position.set(0,6,-55)
scene.add(hall)

/* PILLARS */

function pillar(x){

const p = new THREE.Mesh(
new THREE.CylinderGeometry(.8,.8,10,32),
new THREE.MeshStandardMaterial({color:0x111111})
)

p.position.set(x,5,-52)
scene.add(p)

}

pillar(-7)
pillar(7)

/* STAGE */

const stage = new THREE.Mesh(
new THREE.BoxGeometry(16,1,8),
new THREE.MeshStandardMaterial({
color:0xd4af37,
metalness:.8,
roughness:.3
})
)

stage.position.set(0,.5,-42)
scene.add(stage)

/* DRUM KIT */

const drum = new THREE.Mesh(
new THREE.CylinderGeometry(1,1,.8,32),
new THREE.MeshStandardMaterial({color:0xffffff})
)

drum.position.set(0,1,-45)
scene.add(drum)

/* MUSICIANS */

function musician(x,color){

const g = new THREE.Group()

const body = new THREE.Mesh(
new THREE.BoxGeometry(.7,1.4,.4),
new THREE.MeshStandardMaterial({color})
)

body.position.y=1

const head = new THREE.Mesh(
new THREE.SphereGeometry(.35),
new THREE.MeshStandardMaterial({color})
)

head.position.y=2

g.add(body,head)

g.position.set(x,0,-41)

scene.add(g)

}

musician(-4,0xff4444)
musician(4,0x44ff88)

/* SINGER */

const singer = new THREE.Mesh(
new THREE.CylinderGeometry(.5,.6,1.6),
new THREE.MeshStandardMaterial({color:0xffffff})
)

singer.position.set(0,.8,-40)
scene.add(singer)

/* MICROPHONE */

const mic = new THREE.Mesh(
new THREE.CylinderGeometry(.05,.05,2.5),
new THREE.MeshStandardMaterial({color:0xaaaaaa})
)

mic.position.set(0,1.3,-40)
scene.add(mic)

/* SPEAKERS */

function speaker(x){

const s = new THREE.Mesh(
new THREE.BoxGeometry(3,8,3),
new THREE.MeshStandardMaterial({
color:0xaa00ff,
emissive:0xaa00ff,
emissiveIntensity:1.5
})
)

s.position.set(x,4,-40)
scene.add(s)

}

speaker(-12)
speaker(12)

/* STAGE LIGHTS */

let stageLights=[]

function createLight(x){

const light=new THREE.SpotLight(0xff7a00,8)

light.position.set(x,12,-40)
light.angle=Math.PI/6
light.penumbra=.5
light.distance=120

const target=new THREE.Object3D()
target.position.set(0,0,-42)
scene.add(target)

light.target=target

scene.add(light)

stageLights.push(light)

}

createLight(-8)
createLight(-4)
createLight(0)
createLight(4)
createLight(8)

/* FIREWORKS */

let fireworks=[]

function createFirework(){

for(let i=0;i<250;i++){

const p=new THREE.Mesh(
new THREE.SphereGeometry(.25),
new THREE.MeshBasicMaterial({
color:[0xff7a00,0xffffff,0x4488ff][Math.floor(Math.random()*3)]
})
)

p.position.set(Math.random()*40-20,20,-70)

p.v={
x:(Math.random()-.5)*1.8,
y:Math.random()*3,
z:(Math.random()-.5)*1.8
}

scene.add(p)
fireworks.push(p)

}

}

/* MOVEMENT */

let moving=false
let dancing=false
const stopZ=-32

document.getElementById("moveBtn").onclick=function(){

moving=true
this.style.display="none"

}

/* ANIMATION */

function animate(){

requestAnimationFrame(animate)

stars.rotation.y+=0.0002

/* WALK */

if(moving){

if(character.position.z>stopZ){

character.position.z-=.09
camera.position.z-=.09

const walk=Math.sin(Date.now()*0.01)

leftLeg.rotation.x=walk
rightLeg.rotation.x=-walk
leftArm.rotation.x=-walk
rightArm.rotation.x=walk

}else{

moving=false
dancing=true

document.getElementById("title").style.display="block"
document.getElementById("song").play()

setInterval(createFirework,700)

}

}

/* DANCE */

if(dancing){

character.rotation.y+=0.05
character.position.y=Math.sin(Date.now()*0.01)*.3

}

/* FIREWORKS */

fireworks.forEach(p=>{

p.position.x+=p.v.x
p.position.y+=p.v.y
p.position.z+=p.v.z

p.v.y-=.05

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
