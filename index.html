<!DOCTYPE html>
<html>

<head>
<title>Treble Dusk</title>

<style>

body{
margin:0;
overflow:hidden;
background:#0b4da2;
font-family:Arial, sans-serif;
}

/* Character */

#character{
width:60px;
height:60px;
background:white;
border-radius:10px;
position:absolute;
bottom:100px;
left:50px;
transition:left 5s linear;
}

/* Hall */

#auditorium{
position:absolute;
right:150px;
bottom:80px;
width:220px;
height:130px;
background:orange;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
font-size:18px;
}

/* Button */

#forwardBtn{
position:absolute;
bottom:30px;
left:30px;
padding:15px 25px;
background:orange;
color:white;
border:none;
font-size:18px;
cursor:pointer;
border-radius:8px;
}

/* Title */

#title{
position:absolute;
top:40%;
left:50%;
transform:translateX(-50%);
text-align:center;
color:white;
display:none;
}

#title h1{
font-size:80px;
margin:0;
color:orange;
}

#title h2{
font-size:32px;
margin-top:10px;
}

</style>

</head>


<body>

<div id="character"></div>

<div id="auditorium">
Multipurpose Hall
</div>

<button id="forwardBtn">Move Forward →</button>


<div id="title">

<h1>Treble Dusk 7.0</h1>
<h2>Register Now!</h2>

</div>


<audio id="song">
<source src="song.mp3" type="audio/mpeg">
</audio>


<script>

let btn = document.getElementById("forwardBtn")
let character = document.getElementById("character")
let title = document.getElementById("title")
let song = document.getElementById("song")

btn.onclick = function(){

character.style.left = "600px"

btn.style.display="none"

setTimeout(()=>{
celebrate()
},5000)

}


function celebrate(){

title.style.display="block"

song.play()

startConfetti()

}


/* Simple fireworks effect */

function startConfetti(){

for(let i=0;i<100;i++){

let dot=document.createElement("div")

dot.style.position="absolute"
dot.style.width="8px"
dot.style.height="8px"
dot.style.background="orange"
dot.style.borderRadius="50%"

dot.style.left=Math.random()*window.innerWidth+"px"
dot.style.top=Math.random()*window.innerHeight/2+"px"

document.body.appendChild(dot)

setTimeout(()=>{
dot.remove()
},2000)

}

}

</script>

</body>
</html>
