<!DOCTYPE html>
<html>
<head>

<title>Treble Dusk 7.0</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#moveBtn{
position:absolute;
bottom:30px;
left:30px;
padding:15px 30px;
font-size:18px;
background:#ff7a00;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
z-index:10;
}

#title{
position:absolute;
top:40%;
width:100%;
text-align:center;
color:white;
display:none;
z-index:10;
}

#title h1{
font-size:90px;
color:#ff7a00;
text-shadow:0 0 40px orange;
}

#title h2{
font-size:36px;
}

</style>
</head>

<body>

<button id="moveBtn">Move Forward →</button>

<div id="title">
<h1>Treble Dusk 7.0</h1>
<h2>Register Now!</h2>
</div>

<audio id="song">
<source src="song.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

/* SCENE */

const scene = new THREE.Scene()
scene.background = new THREE.Color(0x01030a)
scene.fog = new THREE.Fog(0x01030a,40,200)

/* CAMERA */

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(0,4,12)

/* RENDERER */

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

/* LIGHTING */

scene.add(new THREE.AmbientLight(0xffffff,0.35))

const moonLight = new THREE.DirectionalLight(0x99aaff,0.9)
moonLight.position.set(20,40,10)
scene.add(moonLight)

/* GROUND */

const ground = new THREE.Mesh(
new THREE.PlaneGeometry(500,500),
new THREE.MeshStandardMaterial({color:0x1a1a2e})
)

ground.rotation.x=-Math.PI/2
scene.add(ground)

/* PATH */

const path = new THREE.Mesh(
new THREE.PlaneGeometry(6,200),
new THREE.MeshStandardMaterial({color:0x333344})
)

path.rotation.x=-Math.PI/2
path.position.y=0.01
scene.add(path)

/* PATH LIGHTS */

for(let i=0;i<12;i++){

const light=new THREE.PointLight(0xff7a00,2,25)

light.position.set(
(i-6)*2,
0.5,
-30-i*5
)

scene.add(light)

}

/* STARS */

const starGeo=new THREE.BufferGeometry()
let starVerts=[]

for(let i=0;i<4000;i++){

starVerts.push(
(Math.random()-0.5)*1200,
Math.random()*600,
(Math.random()-0.5)*1200
)

}

starGeo.setAttribute(
"position",
new THREE.Float32BufferAttribute(starVerts,3)
)

const stars=new THREE.Points(
starGeo,
new THREE.PointsMaterial({color:0xffffff,size:2})
)

scene.add(stars)

/* MOON */

const moon=new THREE.Mesh(
new THREE.SphereGeometry(20,32,32),
new THREE.MeshStandardMaterial({color:0xffffcc})
)

moon.position.set(-200,250,-400)
scene.add(moon)

/* CHARACTER */

const character=new THREE.Group()

const mat=new THREE.MeshStandardMaterial({color:0xffff00})

const body=new THREE.Mesh(
new THREE.BoxGeometry(0.8,1.5,0.5),
mat
)

body.position.y=1.2
character.add(body)

const head=new THREE.Mesh(
new THREE.SphereGeometry(0.4),
mat
)

head.position.y=2.2
character.add(head)

const leftArm=new THREE.Mesh(
new THREE.BoxGeometry(0.25,1,0.25),
mat
)

leftArm.position.set(-0.65,1.2,0)
character.add(leftArm)

const rightArm=new THREE.Mesh(
new THREE.BoxGeometry(0.25,1,0.25),
mat
)

rightArm.position.set(0.65,1.2,0)
character.add(rightArm)

const leftLeg=new THREE.Mesh(
new THREE.BoxGeometry(0.3,1,0.3),
mat
)

leftLeg.position.set(-0.25,0.4,0)
character.add(leftLeg)

const rightLeg=new THREE.Mesh(
new THREE.BoxGeometry(0.3,1,0.3),
mat
)

rightLeg.position.set(0.25,0.4,0)
character.add(rightLeg)

scene.add(character)

/* HALL */

const hall=new THREE.Mesh(
new THREE.BoxGeometry(16,10,16),
new THREE.MeshStandardMaterial({color:0xff7a00})
)

hall.position.set(0,5,-50)
scene.add(hall)

/* STAGE */

const stage=new THREE.Mesh(
new THREE.BoxGeometry(14,1,8),
new THREE.MeshStandardMaterial({
color:0xd4af37,
metalness:0.8,
roughness:0.3
})
)

stage.position.set(0,0.5,-42)
scene.add(stage)

/* DRUM KIT */

const drum=new THREE.Mesh(
new THREE.CylinderGeometry(1,1,0.8,32),
new THREE.MeshStandardMaterial({color:0xffffff})
)

drum.position.set(0,1,-43)
scene.add(drum)

/* GUITARS */

function guitar(x){

const g=new THREE.Mesh(
new THREE.BoxGeometry(0.8,1.6,0.3),
new THREE.MeshStandardMaterial({color:0xff7a00})
)

g.position.set(x,1,-41)
scene.add(g)

}

guitar(-4)
guitar(4)

/* MICROPHONE */

const micStand=new THREE.Mesh(
new THREE.CylinderGeometry(0.05,0.05,2.5),
new THREE.MeshStandardMaterial({color:0xaaaaaa})
)

micStand.position.set(0,1.3,-40)
scene.add(micStand)

/* SPEAKERS */

function speaker(x){

const s=new THREE.Mesh(
new THREE.BoxGeometry(3,8,3),
new THREE.MeshStandardMaterial({color:0x111111})
)

s.position.set(x,4,-40)
scene.add(s)

}

speaker(-10)
speaker(10)

/* STAGE LIGHTS */

let stageLights=[]

function createStageLight(x){

const light=new THREE.SpotLight(0xff7a00,10)
light.position.set(x,12,-40)
light.angle=Math.PI/7
light.penumbra=0.6
light.distance=120

const target=new THREE.Object3D()
target.position.set(0,0,-42)
scene.add(target)

light.target=target

scene.add(light)

stageLights.push(light)

}

createStageLight(-8)
createStageLight(-4)
createStageLight(0)
createStageLight(4)
createStageLight(8)

/* FIREWORKS */

let fireworks=[]

function createFirework(){

const colors=[0xff7a00,0xffffff,0x4488ff]

for(let i=0;i<200;i++){

const p=new THREE.Mesh(
new THREE.SphereGeometry(0.25),
new THREE.MeshBasicMaterial({
color:colors[Math.floor(Math.random()*colors.length)]
})
)

p.position.set(Math.random()*40-20,20,-60)

p.v={
x:(Math.random()-0.5)*1.8,
y:Math.random()*3,
z:(Math.random()-0.5)*1.8
}

scene.add(p)
fireworks.push(p)

}

}

/* MOVEMENT */

let moving=false
let stopZ=-38

document.getElementById("moveBtn").onclick=function(){

moving=true
this.style.display="none"

}

/* ANIMATION */

function animate(){

requestAnimationFrame(animate)

stars.rotation.y+=0.0002

if(moving){

if(character.position.z>stopZ){

character.position.z-=0.09
camera.position.z-=0.09

const walk=Math.sin(Date.now()*0.01)

leftLeg.rotation.x=walk
rightLeg.rotation.x=-walk
leftArm.rotation.x=-walk
rightArm.rotation.x=walk

}else{

moving=false

document.getElementById("title").style.display="block"
document.getElementById("song").play()

setInterval(createFirework,700)

}

}

/* FIREWORK PHYSICS */

fireworks.forEach(p=>{

p.position.x+=p.v.x
p.position.y+=p.v.y
p.position.z+=p.v.z
p.v.y-=0.05

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
