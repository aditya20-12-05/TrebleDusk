<!DOCTYPE html>
<html>
<head>

<title>Treble Dusk 7.0</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
}

/* MOVE BUTTON */

#moveBtn{
position:absolute;
bottom:30px;
left:30px;
padding:15px 30px;
font-size:18px;
background:#ff7a00;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
z-index:10;
}

/* TITLE */

#title{
position:absolute;
top:40%;
width:100%;
text-align:center;
color:white;
display:none;
z-index:10;
}

#title h1{
font-size:90px;
color:#ff7a00;
margin:0;
text-shadow:0 0 30px orange,0 0 60px orange;
}

#title h2{
font-size:36px;
margin-top:10px;
}

</style>

</head>

<body>

<button id="moveBtn">Move Forward →</button>

<div id="title">

<h1>Treble Dusk 7.0</h1>
<h2>Register Now!</h2>

</div>

<audio id="song">
<source src="song.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

/* SCENE */

let scene = new THREE.Scene()

/* DARK NIGHT SKY */

scene.background = new THREE.Color(0x020412)

/* CAMERA */

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(0,5,12)

/* RENDERER */

let renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

/* LIGHTING */

let ambient = new THREE.AmbientLight(0xffffff,0.3)
scene.add(ambient)

let moonLight = new THREE.DirectionalLight(0x99aaff,0.6)
moonLight.position.set(10,20,5)
scene.add(moonLight)

/* GROUND */

let groundGeo = new THREE.PlaneGeometry(300,300)
let groundMat = new THREE.MeshStandardMaterial({color:0xffffff})

let ground = new THREE.Mesh(groundGeo,groundMat)
ground.rotation.x = -Math.PI/2
scene.add(ground)

/* WALKING PATH */

let pathGeo = new THREE.PlaneGeometry(6,200)
let pathMat = new THREE.MeshStandardMaterial({color:0x888888})

let path = new THREE.Mesh(pathGeo,pathMat)
path.rotation.x = -Math.PI/2
path.position.y = 0.01
scene.add(path)

/* STARS */

let starGeo = new THREE.BufferGeometry()
let starCount = 2000
let positions = []

for(let i=0;i<starCount;i++){

positions.push(
(Math.random()-0.5)*800,
Math.random()*400,
(Math.random()-0.5)*800
)

}

starGeo.setAttribute(
"position",
new THREE.Float32BufferAttribute(positions,3)
)

let starMat = new THREE.PointsMaterial({
color:0xffffff,
size:1.2
})

let stars = new THREE.Points(starGeo,starMat)

scene.add(stars)

/* PLANETS */

function createPlanet(size,color,x,y,z){

let geo = new THREE.SphereGeometry(size,32,32)
let mat = new THREE.MeshStandardMaterial({color:color})

let planet = new THREE.Mesh(geo,mat)

planet.position.set(x,y,z)

scene.add(planet)

}

/* add a few planets */

createPlanet(5,0xff8844,-60,80,-120)
createPlanet(3,0x44aaff,80,120,-200)
createPlanet(4,0xaa66ff,120,60,-180)

/* CHARACTER */

let charGeo = new THREE.BoxGeometry(1,2,1)
let charMat = new THREE.MeshStandardMaterial({color:0xffffff})

let character = new THREE.Mesh(charGeo,charMat)

character.position.y = 1

scene.add(character)

/* MULTIPURPOSE HALL */

let hallGeo = new THREE.BoxGeometry(12,7,12)

let hallMat = new THREE.MeshStandardMaterial({
color:0xff7a00,
emissive:0x441100,
emissiveIntensity:0.8
})

let hall = new THREE.Mesh(hallGeo,hallMat)

hall.position.set(0,3.5,-50)

scene.add(hall)

/* HALL LIGHT */

let hallLight = new THREE.SpotLight(0xff7a00,5)

hallLight.position.set(0,20,-50)

hallLight.angle = Math.PI/5
hallLight.distance = 120

hallLight.target = hall

scene.add(hallLight)
scene.add(hallLight.target)

/* FESTIVAL FLOOR LIGHTS */

for(let i=0;i<10;i++){

let light = new THREE.PointLight(0xff7a00,2,30)

light.position.set(
(i-5)*2,
2,
-40
)

scene.add(light)

}

/* FIREWORKS */

let particles=[]

function createFirework(){

let colors=[0xff7a00,0xffffff,0x4488ff]

for(let i=0;i<120;i++){

let geo = new THREE.SphereGeometry(0.12)
let mat = new THREE.MeshBasicMaterial({
color:colors[Math.floor(Math.random()*colors.length)]
})

let p = new THREE.Mesh(geo,mat)

p.position.set(
Math.random()*20-10,
12,
-50
)

p.velocity = {
x:(Math.random()-0.5)*0.6,
y:Math.random()*1,
z:(Math.random()-0.5)*0.6
}

scene.add(p)

particles.push(p)

}

}

/* MOVEMENT */

let moving=false

document.getElementById("moveBtn").onclick=function(){

moving=true
this.style.display="none"

setTimeout(()=>{
celebrate()
},5000)

}

/* CELEBRATION */

function celebrate(){

document.getElementById("title").style.display="block"

document.getElementById("song").play()

setInterval(()=>{
createFirework()
},900)

}

/* ANIMATION LOOP */

function animate(){

requestAnimationFrame(animate)

/* WALKING */

if(moving){

character.position.z -= 0.09

camera.position.z -= 0.09

character.position.y = 1 + Math.sin(Date.now()*0.01)*0.12

}

/* FIREWORK PHYSICS */

particles.forEach(p=>{

p.position.x += p.velocity.x
p.position.y += p.velocity.y
p.position.z += p.velocity.z

p.velocity.y -= 0.03

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
