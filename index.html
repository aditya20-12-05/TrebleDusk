<!DOCTYPE html>
<html>
<head>

<title>Treble Dusk 7.0</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#moveBtn{
position:absolute;
bottom:30px;
left:30px;
padding:15px 30px;
font-size:18px;
background:#ff7a00;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
z-index:10;
}

#title{
position:absolute;
top:40%;
width:100%;
text-align:center;
color:white;
display:none;
z-index:10;
}

#title h1{
font-size:90px;
color:#ff7a00;
text-shadow:0 0 40px orange;
}

#title h2{
font-size:36px;
}

</style>
</head>

<body>

<button id="moveBtn">Move Forward →</button>

<div id="title">
<h1>Treble Dusk 7.0</h1>
<h2>Register Now!</h2>
</div>

<audio id="song">
<source src="song.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

/* SCENE */

const scene = new THREE.Scene()
scene.background = new THREE.Color(0x01030a)

/* CAMERA */

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(0,4,12)

/* RENDERER */

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

/* LIGHT */

const ambient = new THREE.AmbientLight(0xffffff,0.3)
scene.add(ambient)

const moon = new THREE.DirectionalLight(0x99aaff,0.8)
moon.position.set(20,40,10)
scene.add(moon)

/* GROUND */

const ground = new THREE.Mesh(
new THREE.PlaneGeometry(500,500),
new THREE.MeshStandardMaterial({color:0xffffff})
)

ground.rotation.x=-Math.PI/2
scene.add(ground)

/* PATH */

const path = new THREE.Mesh(
new THREE.PlaneGeometry(6,200),
new THREE.MeshStandardMaterial({color:0x666666})
)

path.rotation.x=-Math.PI/2
path.position.y=0.01
scene.add(path)

/* STARS */

const starGeo = new THREE.BufferGeometry()
let starVerts=[]

for(let i=0;i<4000;i++){

starVerts.push(
(Math.random()-0.5)*1200,
Math.random()*600,
(Math.random()-0.5)*1200
)

}

starGeo.setAttribute(
"position",
new THREE.Float32BufferAttribute(starVerts,3)
)

const stars = new THREE.Points(
starGeo,
new THREE.PointsMaterial({color:0xffffff,size:1.5})
)

scene.add(stars)

/* MOON */

const moonSphere = new THREE.Mesh(
new THREE.SphereGeometry(20,32,32),
new THREE.MeshStandardMaterial({color:0xffffcc})
)

moonSphere.position.set(-200,250,-400)
scene.add(moonSphere)

/* CHARACTER */

const character = new THREE.Group()

const body = new THREE.Mesh(
new THREE.BoxGeometry(0.8,1.5,0.5),
new THREE.MeshStandardMaterial({color:0xffffff})
)

body.position.y=1.2
character.add(body)

const head = new THREE.Mesh(
new THREE.SphereGeometry(0.4),
new THREE.MeshStandardMaterial({color:0xffffff})
)

head.position.y=2.2
character.add(head)

const leftArm = new THREE.Mesh(
new THREE.BoxGeometry(0.25,1,0.25),
new THREE.MeshStandardMaterial({color:0xffffff})
)

leftArm.position.set(-0.65,1.2,0)
character.add(leftArm)

const rightArm = new THREE.Mesh(
new THREE.BoxGeometry(0.25,1,0.25),
new THREE.MeshStandardMaterial({color:0xffffff})
)

rightArm.position.set(0.65,1.2,0)
character.add(rightArm)

const leftLeg = new THREE.Mesh(
new THREE.BoxGeometry(0.3,1,0.3),
new THREE.MeshStandardMaterial({color:0xffffff})
)

leftLeg.position.set(-0.25,0.4,0)
character.add(leftLeg)

const rightLeg = new THREE.Mesh(
new THREE.BoxGeometry(0.3,1,0.3),
new THREE.MeshStandardMaterial({color:0xffffff})
)

rightLeg.position.set(0.25,0.4,0)
character.add(rightLeg)

scene.add(character)

/* HALL */

const hall = new THREE.Mesh(
new THREE.BoxGeometry(16,10,16),
new THREE.MeshStandardMaterial({
color:0xff7a00,
emissive:0x441100,
emissiveIntensity:1
})
)

hall.position.set(0,5,-50)
scene.add(hall)

/* STAGE FLOOR */

const stage = new THREE.Mesh(
new THREE.BoxGeometry(14,1,8),
new THREE.MeshStandardMaterial({
color:0xd4af37,
metalness:0.8,
roughness:0.3
})
)

stage.position.set(0,0.5,-42)
scene.add(stage)

/* DRUM KIT */

const drum = new THREE.Mesh(
new THREE.CylinderGeometry(0.8,0.8,0.7,32),
new THREE.MeshStandardMaterial({color:0xffffff})
)

drum.position.set(0,1,-42)
scene.add(drum)

/* GUITARS */

function guitar(x){

const body = new THREE.Mesh(
new THREE.BoxGeometry(0.6,1.4,0.3),
new THREE.MeshStandardMaterial({color:0xff7a00})
)

body.position.set(x,1,-41)
scene.add(body)

}

guitar(-4)
guitar(4)

/* MICROPHONE */

const mic = new THREE.Mesh(
new THREE.CylinderGeometry(0.05,0.05,2.2),
new THREE.MeshStandardMaterial({color:0xaaaaaa})
)

mic.position.set(0,1.2,-40)
scene.add(mic)

/* SPEAKERS */

function speaker(x){

const s = new THREE.Mesh(
new THREE.BoxGeometry(3,8,3),
new THREE.MeshStandardMaterial({color:0x111111})
)

s.position.set(x,4,-40)
scene.add(s)

}

speaker(-10)
speaker(10)

/* STAGE LIGHTS + LASERS */

let stageLights=[]
let lasers=[]

function createStageLight(x){

const light = new THREE.SpotLight(0xff7a00,5)
light.position.set(x,10,-40)

light.angle = Math.PI/6
light.distance = 100

scene.add(light)
stageLights.push(light)

/* LASER */

const laser = new THREE.Mesh(
new THREE.CylinderGeometry(0.1,0.1,20),
new THREE.MeshBasicMaterial({
color:0xff7a00,
transparent:true,
opacity:0.6
})
)

laser.position.set(x,5,-40)
laser.rotation.x=Math.PI/2

scene.add(laser)
lasers.push(laser)

}

createStageLight(-6)
createStageLight(-3)
createStageLight(0)
createStageLight(3)
createStageLight(6)

/* FIREWORKS */

let fireworks=[]

function createFirework(){

const colors=[0xff7a00,0xffffff,0x4488ff]

for(let i=0;i<250;i++){

const p = new THREE.Mesh(
new THREE.SphereGeometry(0.15),
new THREE.MeshBasicMaterial({
color:colors[Math.floor(Math.random()*colors.length)]
})
)

p.position.set(Math.random()*40-20,20,-60)

p.v={
x:(Math.random()-0.5)*1,
y:Math.random()*2,
z:(Math.random()-0.5)*1
}

scene.add(p)
fireworks.push(p)

}

}

/* MOVEMENT */

let moving=false

document.getElementById("moveBtn").onclick=function(){

moving=true
this.style.display="none"

setTimeout(()=>{
celebrate()
},5000)

}

function celebrate(){

document.getElementById("title").style.display="block"
document.getElementById("song").play()

setInterval(createFirework,700)

}

/* ANIMATION */

function animate(){

requestAnimationFrame(animate)

if(moving){

character.position.z -=0.09
camera.position.z -=0.09

const walk=Math.sin(Date.now()*0.01)

leftLeg.rotation.x = walk
rightLeg.rotation.x = -walk
leftArm.rotation.x = -walk
rightArm.rotation.x = walk

}

/* FIREWORK PHYSICS */

fireworks.forEach(p=>{

p.position.x+=p.v.x
p.position.y+=p.v.y
p.position.z+=p.v.z
p.v.y-=0.05

})

/* LASER MOVEMENT */

lasers.forEach((laser,i)=>{

laser.rotation.z=Math.sin(Date.now()*0.001+i)*0.6

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
