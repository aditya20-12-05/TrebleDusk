<!DOCTYPE html>
<html>
<head>

<title>Treble Dusk 7.0</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
}

#moveBtn{
position:absolute;
bottom:30px;
left:30px;
padding:15px 30px;
font-size:18px;
background:#ff7a00;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
z-index:10;
}

#title{
position:absolute;
top:40%;
width:100%;
text-align:center;
color:white;
display:none;
z-index:10;
}

#title h1{
font-size:90px;
color:#ff7a00;
margin:0;
text-shadow:0 0 30px orange,0 0 60px orange;
}

#title h2{
font-size:36px;
margin-top:10px;
}

</style>

</head>

<body>

<button id="moveBtn">Move Forward →</button>

<div id="title">
<h1>Treble Dusk 7.0</h1>
<h2>Register Now!</h2>
</div>

<audio id="song">
<source src="song.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

let scene = new THREE.Scene()
scene.background = new THREE.Color(0x020412)

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(0,4,10)

let renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

/* LIGHT */

let ambient = new THREE.AmbientLight(0xffffff,0.3)
scene.add(ambient)

let moonLight = new THREE.DirectionalLight(0x99aaff,0.7)
moonLight.position.set(10,20,5)
scene.add(moonLight)

/* GROUND */

let groundGeo = new THREE.PlaneGeometry(400,400)
let groundMat = new THREE.MeshStandardMaterial({color:0xffffff})

let ground = new THREE.Mesh(groundGeo,groundMat)
ground.rotation.x = -Math.PI/2
scene.add(ground)

/* PATH */

let pathGeo = new THREE.PlaneGeometry(6,200)
let pathMat = new THREE.MeshStandardMaterial({color:0x777777})

let path = new THREE.Mesh(pathGeo,pathMat)
path.rotation.x = -Math.PI/2
path.position.y = 0.01
scene.add(path)

/* STARS */

let starGeo = new THREE.BufferGeometry()
let starCount = 2000
let positions = []

for(let i=0;i<starCount;i++){

positions.push(
(Math.random()-0.5)*800,
Math.random()*400,
(Math.random()-0.5)*800
)

}

starGeo.setAttribute(
"position",
new THREE.Float32BufferAttribute(positions,3)
)

let starMat = new THREE.PointsMaterial({
color:0xffffff,
size:1.2
})

let stars = new THREE.Points(starGeo,starMat)
scene.add(stars)

/* PLANETS */

function createPlanet(size,color,x,y,z){

let geo = new THREE.SphereGeometry(size,32,32)
let mat = new THREE.MeshStandardMaterial({color:color})

let planet = new THREE.Mesh(geo,mat)

planet.position.set(x,y,z)

scene.add(planet)

}

createPlanet(5,0xff8844,-60,80,-120)
createPlanet(3,0x44aaff,80,120,-200)

/* HALL */

let hallGeo = new THREE.BoxGeometry(14,8,14)
let hallMat = new THREE.MeshStandardMaterial({
color:0xff7a00,
emissive:0x441100,
emissiveIntensity:0.8
})

let hall = new THREE.Mesh(hallGeo,hallMat)
hall.position.set(0,4,-50)
scene.add(hall)

/* SPEAKERS */

let speakerGeo = new THREE.BoxGeometry(2,4,2)
let speakerMat = new THREE.MeshStandardMaterial({color:0x111111})

let speaker1 = new THREE.Mesh(speakerGeo,speakerMat)
speaker1.position.set(-6,2,-45)
scene.add(speaker1)

let speaker2 = new THREE.Mesh(speakerGeo,speakerMat)
speaker2.position.set(6,2,-45)
scene.add(speaker2)

/* CHARACTER */

let loader = new THREE.GLTFLoader()

let character
let mixer

loader.load("character.glb",function(gltf){

character = gltf.scene
character.scale.set(1.5,1.5,1.5)

scene.add(character)

mixer = new THREE.AnimationMixer(character)

let action = mixer.clipAction(gltf.animations[0])
action.play()

})

/* FIREWORKS */

let particles=[]

function createFirework(){

let colors=[0xff7a00,0xffffff,0x4488ff]

for(let i=0;i<120;i++){

let geo = new THREE.SphereGeometry(0.12)
let mat = new THREE.MeshBasicMaterial({
color:colors[Math.floor(Math.random()*colors.length)]
})

let p = new THREE.Mesh(geo,mat)

p.position.set(
Math.random()*20-10,
12,
-50
)

p.velocity = {
x:(Math.random()-0.5)*0.6,
y:Math.random()*1,
z:(Math.random()-0.5)*0.6
}

scene.add(p)

particles.push(p)

}

}

/* MOVEMENT */

let moving=false

document.getElementById("moveBtn").onclick=function(){

moving=true
this.style.display="none"

setTimeout(()=>{
celebrate()
},5000)

}

/* CELEBRATION */

function celebrate(){

document.getElementById("title").style.display="block"

document.getElementById("song").play()

setInterval(()=>{
createFirework()
},900)

}

let clock = new THREE.Clock()

function animate(){

requestAnimationFrame(animate)

let delta = clock.getDelta()

if(mixer) mixer.update(delta)

if(moving && character){

character.position.z -= 0.09
camera.position.z -= 0.09

}

/* FIREWORKS */

particles.forEach(p=>{

p.position.x += p.velocity.x
p.position.y += p.velocity.y
p.position.z += p.velocity.z

p.velocity.y -= 0.03

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
